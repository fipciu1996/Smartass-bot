services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartass-bot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      CONTEXT_DB_HOST: context-db
      CONTEXT_DB_PORT: 5432
      CONTEXT_DB_NAME: ${CONTEXT_DB_NAME:-smartass_bot}
      CONTEXT_DB_USER: ${CONTEXT_DB_USER:-smartass_bot}
      CONTEXT_DB_PASSWORD: ${CONTEXT_DB_PASSWORD:-change-me}
      CONTEXT_DB_SSLMODE: disable
      CONTEXT_DB_CONNECT_TIMEOUT_SECONDS: 10
    networks:
      - default
      - context-net
    depends_on:
      context-db:
        condition: service_healthy
  context-db:
    image: postgres:16.8-bookworm
    container_name: smartass-bot-context-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CONTEXT_DB_NAME:-smartass_bot}
      POSTGRES_USER: ${CONTEXT_DB_USER:-smartass_bot}
      POSTGRES_PASSWORD: ${CONTEXT_DB_PASSWORD:-change-me}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C.UTF-8
    volumes:
      - context-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - context-net

volumes:
  context-db-data:

networks:
  context-net:
    internal: true
